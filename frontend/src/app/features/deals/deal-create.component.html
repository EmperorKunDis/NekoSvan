<div class="page-header">
  <h1>Novy lead</h1>
</div>

<div class="card" style="max-width: 600px">
  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label>Firma</label>
      <input type="text" [(ngModel)]="form.client_company" name="client_company" required />
    </div>
    <div class="form-group">
      <label>Kontaktni osoba</label>
      <input
        type="text"
        [(ngModel)]="form.client_contact_name"
        name="client_contact_name"
        required
      />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="form.client_email" name="client_email" required />
    </div>
    <div class="form-group">
      <label>Telefon</label>
      <input type="tel" [(ngModel)]="form.client_phone" name="client_phone" />
    </div>
    <div class="form-group">
      <label>Popis</label>
      <textarea [(ngModel)]="form.description" name="description"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Vytvorit lead</button>
  </form>
</div>
