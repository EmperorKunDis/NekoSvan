<div class="page-header">
  <h1>Notifikace</h1>
  @if (notifications().length > 0) {
    <button class="btn btn-secondary" (click)="markAllRead()">Oznacit vse jako prectene</button>
  }
</div>

@if (notifications().length === 0) {
  <div class="card">
    <p>Zadne notifikace.</p>
  </div>
} @else {
  <div class="notification-list">
    @for (n of notifications(); track n.id) {
      <div class="card notification-item" [class.unread]="!n.read" (click)="markRead(n)">
        <div class="notification-header">
          <strong>{{ n.title }}</strong>
          <span class="notification-time">{{ n.created_at | date: 'd.M.yyyy HH:mm' }}</span>
        </div>
        <p class="notification-message">{{ n.message }}</p>
      </div>
    }
  </div>
}
