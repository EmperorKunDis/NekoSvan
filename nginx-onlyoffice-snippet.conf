# ONLYOFFICE Document Server proxy
# Requires map directive in http block:
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

location ^~ /app/onlyoffice/ {
    set $nekosvan_onlyoffice nekosvan_onlyoffice:80;
    rewrite ^/app/onlyoffice/(.*)$ /$1 break;
    proxy_pass http://$nekosvan_onlyoffice;
    proxy_http_version 1.1;
    
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
}
