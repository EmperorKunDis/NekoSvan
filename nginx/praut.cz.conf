# Nginx config for praut.cz
# Add this to your main praut.cz nginx config
# Or include it: include /etc/nginx/sites-available/nekosvan.conf;

# NekoSvan CRM at /app/
location /app/ {
    # Rewrite /app/ to / for the frontend
    rewrite ^/app/(.*)$ /$1 break;
    
    proxy_pass http://127.0.0.1:12666;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /app;
}

# API at /app/api/
location /app/api/ {
    rewrite ^/app/api/(.*)$ /api/$1 break;
    
    proxy_pass http://127.0.0.1:13666;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

# ONLYOFFICE at /app/onlyoffice/
location /app/onlyoffice/ {
    rewrite ^/app/onlyoffice/(.*)$ /$1 break;
    
    proxy_pass http://127.0.0.1:9980;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Media files
location /app/media/ {
    rewrite ^/app/media/(.*)$ /media/$1 break;
    proxy_pass http://127.0.0.1:13666;
}

# Static files
location /app/static/ {
    rewrite ^/app/static/(.*)$ /static/$1 break;
    proxy_pass http://127.0.0.1:13666;
    expires 30d;
}
